name: Build and publish nightly ipa

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install SwiftLint
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  build:
    needs: lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Install Xcode platforms
        run: |
          xcrun simctl list > /dev/null # fixes next command sometimes failing
          xcodebuild -downloadPlatform iOS
      - name: Get commit info
        id: commitinfo
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "build=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
      - name: Set build number
        run: |
          # Build number = git commit count (unique per commit); the combined
          # AltStore source dedupes on it. MARKETING_VERSION stays the project's.
          agvtool new-version -all ${{ steps.commitinfo.outputs.build }}
      - name: Build
        run: xcodebuild -scheme "Aidoku (iOS)" -configuration Release archive -archivePath build/Aidoku.xcarchive -skipPackagePluginValidation CODE_SIGN_IDENTITY= CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Package ipa
        id: package
        run: |
          mkdir -p Payload
          cp -r build/Aidoku.xcarchive/Products/Applications/Aidoku.app Payload/
          zip -r Aidoku.ipa Payload
          cp Aidoku.ipa /tmp/Aidoku.ipa
          APP="build/Aidoku.xcarchive/Products/Applications/Aidoku.app/Info.plist"
          echo "version=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP")" >> "$GITHUB_OUTPUT"
          echo "build=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP")" >> "$GITHUB_OUTPUT"
          echo "size=$(stat -f%z Aidoku.ipa)" >> "$GITHUB_OUTPUT"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aidoku-iOS_nightly-${{ steps.commitinfo.outputs.sha_short }}.ipa
          path: /tmp/Aidoku.ipa
          if-no-files-found: error
      - name: Publish to combined AltStore source
        if: github.ref_name == 'andris-cross-source'
        env:
          APP_ID: aidoku
          VERSION: "${{ steps.package.outputs.version }}"
          BUILD: "${{ steps.package.outputs.build }}"
          SIZE: "${{ steps.package.outputs.size }}"
          SHA_SHORT: "${{ steps.commitinfo.outputs.sha_short }}"
          DATE: "${{ steps.commitinfo.outputs.date }}"
          ALTSTORE_TOKEN: "${{ secrets.ALTSTORE_TOKEN }}"
        run: |
          for attempt in 1 2 3; do
            rm -rf /tmp/altstore
            git clone --depth 1 "https://x-access-token:${ALTSTORE_TOKEN}@github.com/Andris73/altstore.git" /tmp/altstore
            mkdir -p /tmp/altstore/ipas /tmp/altstore/icons
            cp /tmp/Aidoku.ipa /tmp/altstore/ipas/aidoku.ipa
            cp Shared/Assets.xcassets/AppIcon.appiconset/Icon.png /tmp/altstore/icons/aidoku.png
            if ( cd /tmp/altstore \
                 && python3 tools/update_app.py \
                 && git config user.name "github-actions" \
                 && git config user.email "github-actions@github.com" \
                 && git add apps.json ipas/aidoku.ipa icons/aidoku.png \
                 && { git commit -m "Aidoku ${VERSION} (build ${BUILD})" || exit 0; } \
                 && git push ); then
              echo "Published Aidoku ${VERSION} (build ${BUILD})"
              break
            fi
            echo "Publish attempt ${attempt} failed (possible push race); retrying…"
            sleep $((RANDOM % 5 + 3))
          done
